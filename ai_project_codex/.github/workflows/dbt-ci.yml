name: dbt-ci

on:
  pull_request:
    paths:
      - "models/**"
      - "macros/**"
      - "seeds/**"
      - "snapshots/**"
      - "tests/**"
      - "dbt_project.yml"
      - "profiles.yml"
      - "packages.yml"
      - "dependencies.yml"
      - "scripts/**"
      - ".github/workflows/dbt-ci.yml"
  push:
    branches:
      - main
    paths:
      - "models/**"
      - "macros/**"
      - "seeds/**"
      - "snapshots/**"
      - "tests/**"
      - "dbt_project.yml"
      - "profiles.yml"
      - "packages.yml"
      - "dependencies.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}
      DBT_TARGET: ci
      DBT_DATABRICKS_HOST: ${{ secrets.DBT_DATABRICKS_HOST }}
      DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_DATABRICKS_HTTP_PATH }}
      DBT_DATABRICKS_CATALOG: ${{ secrets.DBT_DATABRICKS_CATALOG }}
      DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_DATABRICKS_TOKEN }}
      DBT_DATABRICKS_CI_AUTH_TYPE: pat
      DBT_THREADS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set CI schema
        shell: pwsh
        run: |
          $slug = "${{ github.head_ref || github.ref_name }}".ToLower() -replace '[^a-z0-9_]+', '_'
          $slug = $slug.Trim('_')
          if ([string]::IsNullOrWhiteSpace($slug)) { $slug = "run" }
          $schema = "b2_ci_${slug}_${{ github.run_id }}"
          "DBT_CI_SCHEMA=$schema" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-databricks>=1.10.10,<1.12"

      - name: dbt validate
        shell: pwsh
        run: |
          ./scripts/dbt_ci_validate.ps1 -Target ci -Select "state:modified+"

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ github.run_id }}
          path: |
            target/manifest.json
            target/run_results.json
            logs/dbt.log

