version: 2

models:
  - name: int_customer_current
    description: "One current-record customer row per customer_id, based on latest valid_from."

  - name: int_sales_orders_unified
    description: "Sales order events with normalized timestamps and order_date derivation."

  - name: int_sales_line_items
    description: "Sales line items enriched with conformed customer attributes."

  - name: int_telco_customer_conformed
    description: "Conformed telco customer view combining base, missing, and noisy variants."

  - name: int_telco_customer_features
    description: "Telco customer feature set with conformed charges and tenure band derivation."
    columns:
      - name: customer_id
        description: "Telco customer identifier."
        tests: [not_null, unique]
      - name: monthly_charges
        description: "Best-available monthly charges after variant coalescing."
      - name: total_charges
        description: "Best-available total charges after variant coalescing."
      - name: is_churned
        description: "Boolean churn label from base source."
        tests: [not_null]

  - name: int_wine_quality_features
    description: "Wine quality feature engineering layer with quality band and ratio metrics."
    columns:
      - name: wine_record_sk
        description: "Deterministic row hash key from staging."
        tests: [not_null, unique]
      - name: quality
        description: "Wine quality class label."
        tests: [not_null]
      - name: quality_band
        description: "Derived quality tier: high, medium, or low."
