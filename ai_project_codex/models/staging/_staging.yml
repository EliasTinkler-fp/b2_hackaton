version: 2

models:
  - name: stg_b2_stg__customers
    description: "Standardized customer source records with SCD-like validity fields."
    columns:
      - name: customer_version_sk
        description: "Deterministic row identifier built from customer_id and valid_from."
        tests: [not_null, unique]
      - name: customer_id
        description: "Customer identifier."
        tests: [not_null]
      - name: valid_from_ts
        description: "Effective start timestamp."

  - name: stg_b2_stg__sales
    description: "Standardized sales line items."
    columns:
      - name: sales_line_sk
        description: "Deterministic line-level hash key."
        tests: [not_null]
      - name: customer_id
        description: "Customer identifier."
        tests: [not_null]
      - name: order_date
        description: "Order date."
        tests: [not_null]

  - name: stg_b2_stg__sales_orders
    description: "Standardized sales order events with parsed timestamps."
    columns:
      - name: order_event_sk
        description: "Deterministic event-level key."
        tests: [not_null, unique]
      - name: order_number
        description: "Order identifier."
        tests: [not_null]
      - name: customer_id
        description: "Customer identifier."
        tests: [not_null]

  - name: stg_b2_stg__telco_customer_churn
    description: "Cleaned base telco churn dataset."
    columns:
      - name: customer_id
        description: "Telco customer identifier."
        tests: [not_null, unique]

  - name: stg_b2_stg__telco_customer_churn_missing
    description: "Cleaned telco churn dataset with missing values retained."
    columns:
      - name: customer_id
        description: "Telco customer identifier."
        tests: [not_null, unique]

  - name: stg_b2_stg__telco_customer_churn_noisy
    description: "Cleaned telco churn dataset with noisy numeric values."
    columns:
      - name: customer_id
        description: "Telco customer identifier."
        tests: [not_null, unique]

  - name: stg_b2_stg__wine_quality_analysis
    description: "Standardized wine quality analysis records."
    columns:
      - name: wine_record_sk
        description: "Deterministic row hash key."
        tests: [not_null]
      - name: quality
        description: "Quality class label."
        tests: [not_null]

