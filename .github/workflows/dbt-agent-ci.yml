name: dbt-agent-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_project_codex
    env:
      DBT_PROFILES_DIR: .
      DBT_DATABRICKS_HOST: ${{ secrets.DBT_DATABRICKS_HOST }}
      DBT_DATABRICKS_HTTP_PATH: ${{ secrets.DBT_DATABRICKS_HTTP_PATH }}
      DBT_DATABRICKS_CATALOG: ${{ secrets.DBT_DATABRICKS_CATALOG }}
      DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_DATABRICKS_TOKEN }}
      DBT_THREADS: 4
      DBT_DATABRICKS_CI_AUTH_TYPE: pat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync environment
        run: uv sync

      - name: Run dbt validation
        shell: pwsh
        run: ./scripts/dbt_ci_validate.ps1 -Target ci -Select "*"
